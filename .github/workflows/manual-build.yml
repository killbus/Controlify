name: Manual Build

on:
  workflow_dispatch:
    inputs:
      target_version:
        description: 'The version to build (e.g., 1.21.9-fabric)'
        required: true
        default: '1.21.9-fabric'

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build ${{ github.event.inputs.target_version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 25
          distribution: temurin

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build the specified version
        run: ./gradlew :${{ github.event.inputs.target_version }}:build --stacktrace

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.target_version }}-jar
          path: versions/${{ github.event.inputs.target_version }}/build/libs/*.jar
